<!DOCTYPE html>
<html>
<head>
  <title>Civicor</title>
  <style>
    body{
      font-family: Arial;
      background:#f4f4f4;
      padding:20px;
    }
    .post{
      background:white;
      padding:15px;
      margin-bottom:15px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<h2>Latest Post</h2>

<div id="posts"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBgnkyCRMLUq_ciI5jC4JOSPXMDWaJn1x0",
    authDomain: "civicor-3b61a.firebaseapp.com",
    projectId: "civicor-3b61a",
    storageBucket: "civicor-3b61a.firebasestorage.app",
    messagingSenderId: "253401914785",
    appId: "1:253401914785:web:4e050ad74a81e50f373fe0"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.db = db;
import { collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const postsDiv = document.getElementById("posts");

async function loadPosts() {
  postsDiv.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "posts"));

  if (querySnapshot.empty) {
    postsDiv.innerHTML = "<p>No posts yet</p>";
    return;
  }

  querySnapshot.forEach((doc) => {
    const data = doc.data();
    postsDiv.innerHTML += `
      <div class="post">
        <h3>${data.title}</h3>
        <p>${data.content}</p>
      </div>
    `;
  });
}

loadPosts();
</script>

</body>
</html>
