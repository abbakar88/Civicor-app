<!DOCTYPE html>
<html>
<head>
  <title>Civicor</title>
  <style>
    body{
      font-family: Arial;
      background:#f4f4f4;
      padding:20px;
    }
    .post{
      background:white;
      padding:15px;
      margin-bottom:15px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<h2>Latest Post</h2>

<div id="posts"></div>

<script>
let data = localStorage.getItem("post");

if (data) {
  let post = JSON.parse(data);

  document.getElementById("posts").innerHTML = `
    <div class="post">
      <h3>${post.title}</h3>
      <p>${post.content}</p>
    </div>
  `;
} else {
  document.getElementById("posts").innerHTML = "<p>No posts yet</p>";
}
</script>

</body>
</html>
