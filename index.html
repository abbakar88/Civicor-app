<!DOCTYPE html>
<html>

<body>

<h2>CiviCor Register</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>
<button onclick="register()">Register</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
  apiKey: "AIzaSyBgnkyCRMLUq_ciI5jC4JOSPXMDWaJn1x0",
  authDomain: "civicor-3b61a.firebaseapp.com",
  projectId: "civicor-3b61a",
  storageBucket: "civicor-3b61a.firebasestorage.app",
  messagingSenderId: "253401914785",
  appId: "1:253401914785:web:4e050ad74a81e50f373fe0"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window.register = function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
      .then(() => alert("User Registered Successfully!"))
      .catch(error => alert(error.message));
  }
  window.login = function () {
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "dashboard.html";
    })
    .catch((error) => alert(error.message));
};
function signup() {
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "dashboard.html";
    })
    .catch((error) => alert(error.message));
}
function signup() {
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "dashboard.html";
    })
    .catch((error) => alert(error.message));
}

window.signup = signup;
</script>

<h2>Login</h2>
<input type="email" id="loginEmail" placeholder="Enter Email"><br><br>
<input type="password" id="loginPassword" placeholder="Enter Password"><br><br>
<button onclick="login()">Login</button>
<br><br>
<p>Don't have an account?</p>
<button onclick="signup()">Create Account</button>
</body>
