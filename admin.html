<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    body{
      font-family: Arial;
      background:#f4f4f4;
      padding:20px;
    }
    .box{
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }
    input, textarea{
      width:100%;
      padding:10px;
      margin:10px 0;
    }
    button{
      background:green;
      color:white;
      padding:10px;
      border:none;
      cursor:pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Admin Post Panel</h2>

  <input type="text" id="title" placeholder="Post Title">
  <textarea id="content" placeholder="Write something..."></textarea>

  <form>
  <input type="text" id="title" placeholder="Title" />
  <textarea id="content" placeholder="Content"></textarea>
  <button type="submit">Post</button>
  </form>
</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgnkyCRMLUq_ciI5jC4JOSPXMDWaJn1x0",
  authDomain: "civicor-3b61a.firebaseapp.com",
  projectId: "civicor-3b61a",
  storageBucket: "civicor-3b61a.firebasestorage.app",
  messagingSenderId: "253401914785",
  appId: "1:253401914785:web:4e050ad74a81e50f373fe0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.querySelector("form");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;

  await addDoc(collection(db, "posts"), {
    title: title,
    content: content,
    createdAt: new Date()
  });

  alert("Post added successfully!");
  form.reset();
});

</script>


</body>
</html>
