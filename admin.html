<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    body{
      font-family: Arial;
      background:#f4f4f4;
      padding:20px;
    }
    .box{
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }
    input, textarea{
      width:100%;
      padding:10px;
      margin:10px 0;
    }
    button{
      background:green;
      color:white;
      padding:10px;
      border:none;
      cursor:pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Admin Post Panel</h2>

  <input type="text" id="title" placeholder="Post Title">
  <textarea id="content" placeholder="Write something..."></textarea>

  <button onclick="addPost()">Post</button>
</div>

<script>
function addPost(){
  let title = document.getElementById("title").value;
  let content = document.getElementById("content").value;

  if(title === "" || content === ""){
    alert("Fill everything");
    return;
  }

  let post = {
    title:title,
    content:content
  };

  localStorage.setItem("post", JSON.stringify(post));

  alert("Posted Successfully!");
}
</script>

</body>
</html>
